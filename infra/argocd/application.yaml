apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alvas-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/CONECT-IT/alvas-sistema.git
    targetRevision: main
    path: infra/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: alvas
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
