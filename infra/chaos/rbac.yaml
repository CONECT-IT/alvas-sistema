kind: ServiceAccount
apiVersion: v1
metadata:
  namespace: chaos-testing
  name: chaos-viewer

---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: chaos-viewer-role
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces", "events"]
    verbs: ["get", "watch", "list"]
  - apiGroups: ["chaos-mesh.org"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: chaos-viewer-bind
subjects:
  - kind: ServiceAccount
    name: chaos-viewer
    namespace: chaos-testing
roleRef:
  kind: ClusterRole
  name: chaos-viewer-role
  apiGroup: rbac.authorization.k8s.io
