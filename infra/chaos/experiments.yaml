apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: alvas-network-delay-1500ms
  namespace: alvas
spec:
  action: delay
  mode: all
  selector:
    namespaces:
      - alvas
    labelSelectors:
      app: alvas-api
  delay:
    latency: "1500ms"
    jitter: "100ms"
    correlation: "100"
  duration: "180s"
