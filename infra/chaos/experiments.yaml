apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: alvas-pod-kill
  namespace: alvas
spec:
  action: pod-kill
  mode: one
  selector:
    namespaces:
      - alvas
    labelSelectors:
      app: alvas-api
  scheduler:
    cron: "@every 2m"
---
apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: alvas-network-delay
  namespace: alvas
spec:
  action: delay
  mode: all
  selector:
    namespaces:
      - alvas
    labelSelectors:
      app: alvas-api
  delay:
    latency: "200ms"
    jitter: "50ms"
    correlation: "75"
  duration: "30s"
  scheduler:
    cron: "@every 5m"
---
apiVersion: chaos-mesh.org/v1alpha1
kind: StressChaos
metadata:
  name: alvas-cpu-stress
  namespace: alvas
spec:
  mode: one
  selector:
    namespaces:
      - alvas
    labelSelectors:
      app: alvas-api
  stressors:
    cpu:
      load: 80
      workers: 2
  duration: "20s"
  scheduler:
    cron: "@every 5m"
