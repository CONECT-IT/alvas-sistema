apiVersion: apps/v1
kind: Deployment
metadata:
  name: alvas-api
  labels:
    app: alvas-api
    version: v1.5.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alvas-api
  template:
    metadata:
      labels:
        app: alvas-api
        version: v1.5.0
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: alvas-api
          image: ghcr.io/conect-it/alvas-api:v1.5.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8787
              name: http
          env:
            - name: AUTH_TOKEN_TTL_SEGUNDOS
              value: "14400"
            - name: REFRESH_TOKEN_TTL_SEGUNDOS
              value: "604800"
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: alvas-secrets
                  key: auth-secret
            - name: CORS_ORIGINS
              value: "http://localhost:5173,http://localhost:3000"
            - name: DB_PATH
              value: "/app/data/alvas.db"
          volumeMounts:
            - name: data-volume
              mountPath: /app/data
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: data-volume
          persistentVolumeClaim:
            claimName: alvas-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: alvas-api
spec:
  selector:
    app: alvas-api
  ports:
    - port: 80
      targetPort: 8787
      name: http
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: alvas-data-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: alvas-secrets
type: Opaque
stringData:
  auth-secret: "dev-secret-change-in-production-minikube"
