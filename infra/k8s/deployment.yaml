apiVersion: apps/v1
kind: Deployment
metadata:
  name: alvas-api
  labels:
    app: alvas-api
    version: vX.Y.Z
spec:
  replicas: 2
  selector:
    matchLabels:
      app: alvas-api
  template:
    metadata:
      labels:
        app: alvas-api
        version: vX.Y.Z
    spec:
      containers:
        - name: alvas-api
          image: ghcr.io/conect-it/alvas-api:vX.Y.Z
          ports:
            - containerPort: 8787
              name: http
          env:
            - name: AUTH_TOKEN_TTL_SEGUNDOS
              value: "14400"
            - name: REFRESH_TOKEN_TTL_SEGUNDOS
              value: "604800"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: alvas-api
spec:
  selector:
    app: alvas-api
  ports:
    - port: 80
      targetPort: 8787
      name: http
