name: E2E Pipeline

on:
  workflow_run:
    workflows: ["Test & Quality Pipeline"]
    types: [completed]
  workflow_dispatch:
    inputs:
      ref:
        description: "Ref, branch o SHA a validar"
        required: false
        type: string

concurrency:
  group: e2e-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  NODE_ENV: test
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  web-e2e:
    name: Web E2E
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - name: Build Web para E2E
        run: bun run --cwd apps/web --bun build
      - run: bunx playwright install --with-deps chromium
        working-directory: apps/web
      - run: bun run --cwd apps/web test:e2e
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          if-no-files-found: ignore
          retention-days: 30
