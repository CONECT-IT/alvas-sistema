name: CI

on:
  push:
    branches:
      - develop
      - main
      - "feature/**"
      - "stryker-*"
  pull_request:
    branches:
      - develop
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  NODE_ENV: test
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    strategy:
      fail-fast: false
      matrix:
        app: [api, web]
    uses: ./.github/workflows/jobs/lint.yml
    with:
      app: ${{ matrix.app }}

  api-sast:
    uses: ./.github/workflows/jobs/api-sast.yml

  build:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        app: [api, web]
    uses: ./.github/workflows/jobs/build.yml
    with:
      app: ${{ matrix.app }}

  api-unit-test:
    needs: build
    uses: ./.github/workflows/jobs/api-unit-test.yml

  api-integration-bdd:
    needs: api-unit-test
    uses: ./.github/workflows/jobs/api-integration-bdd.yml

  api-coverage:
    needs: api-integration-bdd
    uses: ./.github/workflows/jobs/api-coverage.yml

  api-security:
    needs: api-coverage
    uses: ./.github/workflows/jobs/api-security.yml

  api-mutation:
    needs: [api-coverage, api-security]
    uses: ./.github/workflows/jobs/api-mutation.yml

  web-component-test:
    needs: build
    uses: ./.github/workflows/jobs/web-component-test.yml

  web-coverage:
    needs: web-component-test
    uses: ./.github/workflows/jobs/web-coverage.yml

  quality-gate:
    needs:
      - lint
      - build
      - api-unit-test
      - api-integration-bdd
      - api-coverage
      - api-security
      - api-mutation
      - web-component-test
      - web-coverage
    if: always()
    uses: ./.github/workflows/jobs/quality-gate.yml
    with:
      lint-result: ${{ needs.lint.result }}
      build-result: ${{ needs.build.result }}
      api-unit-test-result: ${{ needs.api-unit-test.result }}
      api-integration-bdd-result: ${{ needs.api-integration-bdd.result }}
      api-coverage-result: ${{ needs.api-coverage.result }}
      api-security-result: ${{ needs.api-security.result }}
      api-mutation-result: ${{ needs.api-mutation.result }}
      web-component-test-result: ${{ needs.web-component-test.result }}
      web-coverage-result: ${{ needs.web-coverage.result }}

  update-status-log:
    needs: quality-gate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/jobs/update-status-log.yml
