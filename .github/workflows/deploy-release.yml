name: Deploy Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Ref, tag o SHA a desplegar"
        required: false
        type: string

concurrency:
  group: deploy-release-${{ github.ref }}
  cancel-in-progress: false

env:
  CI: "true"
  HUSKY: "0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  API_URL: ${{ vars.API_URL_PRODUCTION || 'https://alvas-api.softwarelazana.workers.dev' }}

jobs:
  quality-check:
    name: Quality check de release
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile --filter "./apps/api" --filter "./apps/web"
      - run: bun run --cwd apps/api lint
      - run: bun run --cwd apps/web lint
      - run: bun run --cwd apps/api test
      - run: bun run --cwd apps/api test:bdd
      - run: bun run --cwd apps/web test:unit
      - run: bun run coverage:domain

  deploy-release:
    name: Deploy API y Web a production
    runs-on: ubuntu-latest
    needs: quality-check
    timeout-minutes: 20
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile --filter "./apps/api" --filter "./apps/web"
      - name: Migrar D1 production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bun run --cwd apps/api wrangler d1 migrations apply alvas-main --remote --env production
      - name: Deploy API production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bun run --cwd apps/api wrangler deploy --env production
      - name: Preparar version web production
        run: |
          SHORT_SHA="$(git rev-parse --short HEAD)"
          VERSION="$(git describe --tags --exact-match 2>/dev/null || echo manual-${SHORT_SHA})"
          {
            echo "PUBLIC_APP_ENV=production"
            echo "PUBLIC_APP_VERSION=${VERSION}"
            echo "PUBLIC_APP_COMMIT=${SHORT_SHA}"
          } >> "$GITHUB_ENV"
      - name: Build Web production
        run: bun run --cwd apps/web --bun build
      - name: Deploy Web production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: >
          bunx wrangler pages deploy apps/web/.svelte-kit/cloudflare
          --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT_PRODUCTION || 'alvas-web' }}
          --branch=main
