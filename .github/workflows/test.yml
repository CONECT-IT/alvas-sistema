name: Test & Quality Pipeline

on:
  push:
    branches:
      - develop
      - main
      - "feature/**"
      - "stryker-*"
  pull_request:
    branches:
      - develop
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  NODE_ENV: test
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    name: "Stage 1: Lint (${{ matrix.app }})"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        app: [api, web]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run --cwd apps/${{ matrix.app }} lint
      - run: bunx tsc --noEmit -p apps/${{ matrix.app }}/tsconfig.json

  api-sast:
    name: "CodeQL SAST"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          build-mode: none
      - uses: github/codeql-action/analyze@v3

  build:
    name: "Stage 2: Build (${{ matrix.app }})"
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        app: [api, web]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run --cwd apps/${{ matrix.app }} build
      - uses: actions/upload-artifact@v6
        if: matrix.app == 'web'
        with:
          name: web-build-svelte-kit
          path: apps/web/.svelte-kit/
          include-hidden-files: true
          retention-days: 7

  api-unit-test:
    name: "Stage 3a: API Unit Test"
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run --cwd apps/api test

  api-integration-bdd:
    name: "Stage 4a: API Integration BDD"
    runs-on: ubuntu-latest
    needs: api-unit-test
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run --cwd apps/api test:bdd

  api-coverage:
    name: "Stage 5a: API Domain Coverage"
    runs-on: ubuntu-latest
    needs: api-integration-bdd
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Quality gate de cobertura de dominio
        run: bun run coverage:domain
      - name: Resumen de cobertura API
        if: always()
        run: |
          {
            echo "## Cobertura de dominio API"
            echo ""
            if [ -f apps/api/coverage/lcov.info ]; then
              bun scripts/check-domain-coverage.mjs apps/api/coverage/lcov.info 80
            else
              echo "No se encontro el reporte de coverage."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: api-coverage-report
          path: apps/api/coverage/
          retention-days: 60

  api-security:
    name: "Stage 5b: API Security Audit"
    runs-on: ubuntu-latest
    needs: api-coverage
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Verificar que DTOs no exponen datos sensibles
        run: bun run --cwd apps/api test:security

  api-mutation:
    name: "Stage 6a: API Mutation Test"
    runs-on: ubuntu-latest
    needs: [api-coverage, api-security]
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Quality gate de mutation testing
        env:
          STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_API_KEY }}
        run: bun run test:mutation
      - name: Resumen de mutation testing
        if: always()
        env:
          STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_API_KEY }}
        run: |
          {
            echo "## Mutation testing API"
            echo ""
            if [ -f reports/mutation/mutation.json ]; then
              bun scripts/write-mutation-summary.mjs reports/mutation/mutation.json
            else
              echo "No se encontro el reporte de mutation testing. Revisa los logs del job de Stryker."
            fi
            echo ""
            echo "Artifact: \`stryker-report\`"
            if [ -n "$STRYKER_DASHBOARD_API_KEY" ]; then
              echo "Stryker dashboard upload: habilitado"
            else
              echo "Stryker dashboard upload: deshabilitado (falta secret)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: stryker-report
          path: reports/mutation/
          if-no-files-found: ignore
          retention-days: 90

  web-component-test:
    name: "Stage 3b: Web Component Test"
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run --cwd apps/web test:unit

  web-coverage:
    name: "Stage 4b: Web Coverage"
    runs-on: ubuntu-latest
    needs: web-component-test
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run --cwd apps/web coverage:components
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: web-coverage-report
          path: apps/web/coverage/
          retention-days: 60

  quality-gate:
    name: "Quality Gate"
    runs-on: ubuntu-latest
    needs:
      - lint
      - build
      - api-unit-test
      - api-integration-bdd
      - api-coverage
      - api-security
      - api-mutation
      - web-component-test
      - web-coverage
    if: always()
    steps:
      - name: Verificar todos los stages
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] ||
             [ "${{ needs.build.result }}" != "success" ] ||
             [ "${{ needs.api-unit-test.result }}" != "success" ] ||
             [ "${{ needs.api-integration-bdd.result }}" != "success" ] ||
             [ "${{ needs.api-coverage.result }}" != "success" ] ||
             [ "${{ needs.api-security.result }}" != "success" ] ||
             [ "${{ needs.api-mutation.result }}" != "success" ] ||
             [ "${{ needs.web-component-test.result }}" != "success" ] ||
             [ "${{ needs.web-coverage.result }}" != "success" ]; then
            echo "El pipeline fallo antes de cumplir todos los quality gates de API/Web."
            exit 1
          fi
          echo "Todos los quality gates de API y Web pasaron."
