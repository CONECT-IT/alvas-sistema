name: Test & Quality Pipeline

on:
  push:
    branches:
      - develop
      - main
      - "feature/**"
      - "stryker-*"
  pull_request:
    branches:
      - develop
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  NODE_ENV: test

jobs:
  lint:
    name: "Stage 1: Lint (${{ matrix.app }})"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        app: [api, web]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run --cwd apps/${{ matrix.app }} lint
      - run: bunx tsc --noEmit -p apps/${{ matrix.app }}/tsconfig.json

  build:
    name: "Stage 2: Build (${{ matrix.app }})"
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        app: [api, web]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run --cwd apps/${{ matrix.app }} build

  api-unit-test:
    name: "Stage 3a: API Unit Test"
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run --cwd apps/api test

  api-integration-bdd:
    name: "Stage 4a: API Integration BDD"
    runs-on: ubuntu-latest
    needs: api-unit-test
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run --cwd apps/api test:bdd

  api-coverage:
    name: "Stage 5a: API Domain Coverage"
    runs-on: ubuntu-latest
    needs: api-integration-bdd
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Domain coverage gate
        run: bun run coverage:domain
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-coverage-report
          path: coverage/
          retention-days: 60

  api-mutation:
    name: "Stage 6a: API Mutation Test"
    runs-on: ubuntu-latest
    needs: api-coverage
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Stryker mutation gate
        env:
          STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_API_KEY }}
        run: bun run test:mutation
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stryker-report
          path: reports/mutation/
          retention-days: 90

  web-component-test:
    name: "Stage 3b: Web Component Test"
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run --cwd apps/web test:unit

  web-e2e:
    name: "Stage 4b: Web E2E"
    runs-on: ubuntu-latest
    needs: web-component-test
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium
      - run: bun run --cwd apps/web test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 30

  web-coverage:
    name: "Stage 5b: Web Coverage"
    runs-on: ubuntu-latest
    needs: web-e2e
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run --cwd apps/web coverage:components
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: web-coverage-report
          path: apps/web/coverage/
          retention-days: 60

  quality-gate:
    name: "Quality Gate"
    runs-on: ubuntu-latest
    needs:
      - lint
      - build
      - api-unit-test
      - api-integration-bdd
      - api-coverage
      - api-mutation
      - web-component-test
      - web-e2e
      - web-coverage
    if: always()
    steps:
      - name: Verify all stages
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] ||
             [ "${{ needs.build.result }}" != "success" ] ||
             [ "${{ needs.api-unit-test.result }}" != "success" ] ||
             [ "${{ needs.api-integration-bdd.result }}" != "success" ] ||
             [ "${{ needs.api-coverage.result }}" != "success" ] ||
             [ "${{ needs.api-mutation.result }}" != "success" ] ||
             [ "${{ needs.web-component-test.result }}" != "success" ] ||
             [ "${{ needs.web-e2e.result }}" != "success" ] ||
             [ "${{ needs.web-coverage.result }}" != "success" ]; then
            echo "Pipeline failed before satisfying all API/Web quality gates."
            exit 1
          fi
          echo "All API and Web quality gates passed."
