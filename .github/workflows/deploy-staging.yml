name: Deploy Staging

on:
  workflow_run:
    workflows: ["Test & Quality Pipeline"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-staging-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  HUSKY: "0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  API_URL: ${{ vars.API_URL_STAGING || 'https://alvas-api-staging.softwarelazana.workers.dev' }}

jobs:
  deploy-staging:
    name: Deploy API y Web a staging
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'develop')
    timeout-minutes: 20
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - name: Migrar D1 staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bun run --cwd apps/api wrangler d1 migrations apply alvas-staging --remote --env staging
      - name: Deploy API staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bun run --cwd apps/api wrangler deploy --env staging
      - name: Preparar version web staging
        run: |
          SHORT_SHA="$(git rev-parse --short HEAD)"
          BASE_VERSION="$(git describe --tags --abbrev=0 --match 'v*.*.*' 2>/dev/null || echo v0.0.0)"
          {
            echo "PUBLIC_APP_ENV=staging"
            echo "PUBLIC_APP_VERSION=${BASE_VERSION}+dev.${SHORT_SHA}"
            echo "PUBLIC_APP_COMMIT=${SHORT_SHA}"
          } >> "$GITHUB_ENV"
      - name: Build Web staging
        run: bun run --cwd apps/web --bun build
      - name: Deploy Web staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: >
          bunx wrangler pages deploy apps/web/.svelte-kit/cloudflare
          --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT || 'alvas-web' }}
          --branch=develop
