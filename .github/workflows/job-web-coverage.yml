name: Web Coverage

on:
  workflow_call:

jobs:
  web-coverage:
    name: "Web Coverage"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile --filter "./apps/api" --filter "./apps/web"
      - run: bun run --cwd apps/web coverage:components
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: web-coverage-report
          path: apps/web/coverage/
          retention-days: 60
