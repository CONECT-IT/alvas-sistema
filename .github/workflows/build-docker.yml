name: Build and Push Docker Image

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag de la imagen (ej: v1.0.0)"
        required: true
        type: string

concurrency:
  group: build-docker-${{ github.ref }}
  cancel-in-progress: false

env:
  CI: "true"
  REGISTRY: ghcr.io
  IMAGE_NAME: conect-it/alvas-api

jobs:
  quality-check:
    name: Quality check antes de build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile --filter "./apps/api" --filter "./apps/web"
      - run: bun run --cwd apps/api lint
      - run: bun run --cwd apps/api test
      - run: bun run --cwd apps/api test:bdd

  build-and-push:
    name: Build y push imagen Docker
    runs-on: ubuntu-latest
    needs: quality-check
    timeout-minutes: 20
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determinar tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Update deployment.yaml
        run: |
          sed -i "s|image: alvas-api:local|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.version }}|g" infra/k8s/deployment.yaml
          sed -i "s|version: v.*|version: ${{ steps.tag.outputs.version }}|g" infra/k8s/deployment.yaml

      - name: Commit and push deployment update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/k8s/deployment.yaml
          git commit -m "chore: update deployment to ${{ steps.tag.outputs.version }}" || exit 0
          git push
