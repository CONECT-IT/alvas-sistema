name: SCM Status Report

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  update-status-report:
    name: Generar registro de estado SCM
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generar scm-status-report.json
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          AUTHOR="${{ github.actor }}"
          COMMIT="${{ github.sha }}"
          SHORT_SHA="${COMMIT:0:7}"
          REPO="${{ github.repository }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          PR_NUMBER="${{ github.event.head_commit.message }}" 

          if [ -f scm-status-report.json ]; then
            jq --arg ts "$TIMESTAMP" \
               --arg author "$AUTHOR" \
               --arg commit "$SHORT_SHA" \
               --arg sha "$COMMIT" \
               --arg repo "$REPO" \
               --arg url "$RUN_URL" \
               '.entries += [{
                 "timestamp": $ts,
                 "author": $author,
                 "commit": $sha,
                 "commitShort": $commit,
                 "repository": $repo,
                 "status": "merged",
                 "ciRunUrl": $url
               }]' scm-status-report.json > tmp.json && mv tmp.json scm-status-report.json
          else
            echo '{
              "project": "alvas-sistema",
              "lastUpdated": "'"$TIMESTAMP"'",
              "entries": [{
                "timestamp": "'"$TIMESTAMP"'",
                "author": "'"$AUTHOR"'",
                "commit": "'"$COMMIT"'",
                "commitShort": "'"$SHORT_SHA"'",
                "repository": "'"$REPO"'",
                "status": "merged",
                "ciRunUrl": "'"$RUN_URL"'"
              }]
            }' > scm-status-report.json
          fi

          jq --arg ts "$TIMESTAMP" '.lastUpdated = $ts' scm-status-report.json > tmp.json && mv tmp.json scm-status-report.json

      - name: Crear PR con status report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="scm-update/$(date -u +%Y%m%d-%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add scm-status-report.json
          git commit -m "docs: actualizar registro de estado SCM"
          git push -u origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "docs: SCM status report update" \
            --body "Registro de estado SCM actualizado automaticamente tras merge a main.

          - Commit merge: ${{ github.sha }}
          - Author: ${{ github.actor }}
          - Timestamp: $(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            || echo "PR ya existe o no se pudo crear"
