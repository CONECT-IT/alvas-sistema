name: Version Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: version-release-${{ github.ref }}
  cancel-in-progress: false

env:
  CI: "true"
  HUSKY: "0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  semantic-release:
    name: Crear version semantica
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - name: Publicar tag y GitHub Release
        env:
          GH_TOKEN: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}
        run: bun run release
