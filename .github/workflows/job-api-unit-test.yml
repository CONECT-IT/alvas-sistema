name: API Unit Test

on:
  workflow_call:

jobs:
  api-unit-test:
    name: "API Unit Test"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile --filter "./apps/api" --filter "./apps/web"
      - run: bun run --cwd apps/api test
